            font-family: Tahoma, Arial, sans-serif;
            line-height: 1.8;
            padding: 18px;
        }

        .thanks-card {
            width: min(680px, 100%);
            padding: clamp(24px, 5vw, 44px);
            border: 1px solid var(--line);
            border-top: 6px solid var(--green);
            border-radius: 8px;
            background: var(--white);
            box-shadow: 0 16px 45px rgba(17, 17, 17, 0.1);
            text-align: center;
        }

        img {
            width: min(300px, 82vw);
            height: auto;
            aspect-ratio: 1280 / 553;
            object-fit: contain;
            border-radius: 4px;
            margin: 0 auto 18px;
            background: var(--white);
        }

        h1 {
            margin: 0 0 12px;
            color: var(--red);
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            line-height: 1.35;
        }

        p {
            margin: 0;
            color: #333333;
            font-size: 1.04rem;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 24px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
        }

        .primary {
            background: var(--green);
            color: var(--white);
        }

        .secondary {
            background: var(--soft);
            color: var(--black);
            border: 1px solid var(--line);
        }
    </style>
</head>
